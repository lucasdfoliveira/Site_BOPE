<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Exercícios formulário</title>
    </head>
    <body>
        <form action="/exercícios formulários.html" method="post">
            <fieldset>
                <legend>Dados Gerais</legend>
                <label for="nome">Nome:</label>
                <input type="text" minlength="2" id="nome" />
                <label for="Data_nascimento">Data de nascimento:</label>
                <input type="text" id="Data_nascimento" />
                <label for="cpf">CPF:</label>
                <input type="cpf" minlength="11" id="cpf" />
            </fieldset>

            <fieldset>
                <legend>Endereço</legend>
                <label for="tipo_endereco">Tipo</label>
                <select id="tipo_endereco">
                    <option value="">Selecione</option>
                    <option value="">Rua</option>
                    <option value="">Estrada</option>
                    <option value="">Rodovia</option>
                    <option value="">Outros</option>
                </select>
                <label for="logradouro">Logradouro:</label>
                <input type="text" id="logradouro">
                <label for="numero">Número:</label>
                <input type="text" id="numero">
                <label for="complemento">Complemento</label>
                <select id="complemento">
                    <option value="">Selecione</option>
                    <option value="">Casa</option>
                    <option value="">Apto</option>
                    <option value="">Outros</option>
                </select>
            </fieldset>
            <fieldset>
                <legend>Fale conosco</legend>
                <label for="mensagem">Mensagem:</label>
                <textarea type="text" id="mensagem"></textarea>
            </fieldset>
            <fieldset>
                <button type="submit">Enviar sua mensagem</button>
                <button type="reset">Resetar o formulário</button>
            </fieldset>
        </form>
    </body>
</html>
