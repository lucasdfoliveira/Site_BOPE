<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<title>EXERCÍCIOS TABELA</title>
</head>
<body>
<h1>Exercício de tabelas</h1>
<div>
<div>
<h3>Tabela simples:</h3>
<table>
	<tr>
		<td>Lucas</td>
		<td>Java</td>
		<td>21</td>
	</tr>
	<tr>
		<td>Thayná</td>
		<td>Java</td>
		<td>21</td>
	</td>
</table>
<div>
<div>
<h3>Tabela com cabeçalho e rodapé, COLSPAN e ROWSPAN</h3>
<table width="300" border="1">
<thead>
	<tr>
		<th>Nome</th>
		<th>Linguagem</th>
		<th>Versão</th>
	</tr>
</thead>
	<tr>
		<td>Lucas</td>
		<td rowspan="2">Java</td>
		<td>21</td>
	</tr>
	<tr>
		<td>Thayná</td>
		<td>21</td>
	</td>
	<tfoot>
	<tr>
	<th>Fuctura</th>
	<th colspan="2">Fuctura</th>
	</tr>
	</tfoot>
</table>

</body>
</html>
